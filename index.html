<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dragon Flight</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  background: linear-gradient(#6ec6ff, #eaf8ff);
  touch-action: none;
}

/* 🐉 дракон снизу */
#dragonBody {
  position: absolute;
  left: 50%;
  bottom: 30px;
  transform: translateX(-50%);
}

#neck {
  width: 18px;
  height: 70px;
  background: #111;
  margin: 0 auto;
  border-radius: 20px;
}

#head {
  width: 70px;
  height: 50px;
  background: #000;
  border-radius: 50% 50% 40% 40%;
  position: relative;
  top: -10px;
}

#wings {
  position: absolute;
  width: 200px;
  height: 80px;
  background: rgba(0,0,0,0.15);
  border-radius: 50%;
  display: none;
  left: 50%;
  bottom: 60px;
  transform: translateX(-50%);
}

#startBtn {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  padding: 12px 16px;
  font-size: 18px;
  z-index: 10;
}

#debug {
  position: absolute;
  top: 10px;
  left: 10px;
  font-family: sans-serif;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="dragonBody">
  <div id="head"></div>
  <div id="neck"></div>
</div>

<div id="wings"></div>
<button id="startBtn">Start 🐉</button>
<div id="debug">Tilt: 0</div>

<script>

let xTilt = 0;
let speed = 4;
let isHolding = false;
let started = false;

let x = window.innerWidth / 2;

const dragon = document.getElementById("dragonBody");
const wings = document.getElementById("wings");
const btn = document.getElementById("startBtn");
const debug = document.getElementById("debug");

// 🚀 старт
btn.onclick = async () => {
  started = true;
  btn.style.display = "none";

  try {
    if (typeof DeviceOrientationEvent.requestPermission === "function") {
      await DeviceOrientationEvent.requestPermission();
    }
  } catch (e) {}
};

// 📱 наклон (если работает)
window.addEventListener("deviceorientation", (e) => {
  if (!started) return;
  xTilt = e.gamma || 0;
  debug.innerText = "Tilt: " + xTilt.toFixed(1);
});

// 🫳 удержание = тормоз
document.addEventListener("touchstart", () => {
  if (!started) return;
  isHolding = true;
  wings.style.display = "block";
});

document.addEventListener("touchend", () => {
  isHolding = false;
  wings.style.display = "none";
});

// 🐉 цикл
function loop() {

  if (started) {

    let moveX = xTilt * 0.4;

    if (isHolding) {
      speed *= 0.92;
      if (speed < 1) speed = 1;
    } else {
      speed += 0.02;
      if (speed > 7) speed = 7;
    }

    x += moveX;

    if (x < 0) x = 0;
    if (x > window.innerWidth) x = window.innerWidth;

    dragon.style.left = x + "px";

  }

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>  #startBtn {

    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    padding: 12px 16px;
    font-size: 18px;
  }

  #debug {
    position: absolute;
    top: 10px;
    left: 10px;
    font-family: sans-serif;
    font-size: 14px;
  }
</style>
</head>

<body>

<div id="dragon"></div>
<div id="wings"></div>
<button id="startBtn">Start 🐉</button>
<div id="debug">Tilt: 0</div>

<script>

let xTilt = 0;
let speed = 4;
let isHolding = false;
let started = false;

let x = window.innerWidth / 2;
let y = window.innerHeight * 0.6;

const dragon = document.getElementById("dragon");
const wings = document.getElementById("wings");
const btn = document.getElementById("startBtn");
const debug = document.getElementById("debug");

// 🚀 старт + РАЗРЕШЕНИЕ СЕНСОРОВ
btn.onclick = async () => {
  started = true;
  btn.style.display = "none";

  try {
    if (typeof DeviceOrientationEvent.requestPermission === "function") {
      await DeviceOrientationEvent.requestPermission();
    }
  } catch (e) {}
};

// 📱 НАКЛОН
window.addEventListener("deviceorientation", (e) => {
  if (!started) return;

  xTilt = e.gamma || 0;
  debug.innerText = "Tilt: " + xTilt.toFixed(1);
});

// 🫳 удержание
document.addEventListener("touchstart", () => {
  if (!started) return;
  isHolding = true;
  wings.style.display = "block";
});

document.addEventListener("touchend", () => {
  isHolding = false;
  wings.style.display = "none";
});

// 🐉 цикл
function loop() {

  if (started) {

    let moveX = xTilt * 0.4;

    if (isHolding) {
      speed *= 0.92;
      if (speed < 1) speed = 1;
    } else {
      speed += 0.02;
      if (speed > 7) speed = 7;
    }

    x += moveX;
    y -= speed;

    if (x < 0) x = 0;
    if (x > window.innerWidth) x = window.innerWidth;
    if (y < 0) y = window.innerHeight;

    dragon.style.left = x + "px";
    dragon.style.top = y + "px";

    wings.style.left = x + "px";
    wings.style.top = (y + 20) + "px";
  }

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
  </html>
