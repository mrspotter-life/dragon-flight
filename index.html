<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dragon Flight</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  background: linear-gradient(#87c9ff, #dff2ff);
  touch-action: none;
}

/* 🐉 "дракон" — 3D блок */
#dragon {
  position: absolute;
  width: 120px;
  height: 180px;
  background: #1a1a1a;
  border-radius: 20px;
  left: 50%;
  bottom: 10%;
  transform: translateX(-50%);
  opacity: 0.9;
}

/* ☁️ облака */
.cloud {
  position: absolute;
  width: 120px;
  height: 60px;
  background: white;
  border-radius: 50px;
  opacity: 0.9;
}

/* HUD */
#debug {
  position: absolute;
  top: 10px;
  left: 10px;
  font-family: sans-serif;
  font-size: 14px;
  color: #000;
}
</style>
</head>

<body>

<div id="dragon"></div>
<div id="debug">Speed: 0</div>

<script>

let speed = 4;
let x = window.innerWidth / 2;

// 🐉 управление (пока без наклона — чтобы работало ВСЕГДА)
let moveX = 0;

// облака
let clouds = [];

// создаём облака
function createCloud() {
  const c = document.createElement("div");
  c.className = "cloud";
  c.style.left = Math.random() * window.innerWidth + "px";
  c.style.top = "-80px";
  document.body.appendChild(c);

  clouds.push({
    el: c,
    x: parseFloat(c.style.left),
    y: -80
  });
}

// создаём стартовые облака
for (let i = 0; i < 8; i++) {
  createCloud();
}

// 🫳 управление пальцем (движение влево/вправо)
document.addEventListener("touchmove", (e) => {
  let touch = e.touches[0];
  moveX = (touch.clientX - window.innerWidth / 2) * 0.01;
});

// 🚀 цикл
function loop() {

  // скорость "полёта вперёд"
  speed += 0.01;
  if (speed > 8) speed = 8;

  x += moveX * 5;

  if (x < 0) x = 0;
  if (x > window.innerWidth) x = window.innerWidth;

  document.getElementById("dragon").style.left = x + "px";

  // ☁️ движение облаков
  for (let c of clouds) {
    c.y += speed;

    if (c.y > window.innerHeight) {
      c.y = -80;
      c.x = Math.random() * window.innerWidth;
    }

    c.el.style.top = c.y + "px";
    c.el.style.left = c.x + "px";
  }

  document.getElementById("debug").innerText =
    "Speed: " + speed.toFixed(1);

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
