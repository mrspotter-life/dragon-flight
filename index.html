<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dragon FPV Flight</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  background: linear-gradient(#78bfff, #eaf6ff);
  touch-action: none;
}

/* 🐉 дракон (FPV “кабина”) */
#dragon {
  position: absolute;
  width: 35vw;
  height: 28vh;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  background: #111;
  border-radius: 40px 40px 0 0;
  opacity: 0.95;
}

/* ☁️ облака */
.cloud {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.9;
  filter: blur(0.5px);
}

/* HUD */
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  font-family: sans-serif;
  font-size: 14px;
  color: #000;
}
</style>
</head>

<body>

<div id="dragon"></div>
<div id="hud">Speed: 0</div>

<script>

let speed = 0.8;
let tilt = 0;
let hold = false;
let camX = 0;

// 🌌 облака в 3D пространстве
let clouds = [];

function spawnCloud(zOverride = null) {
  return {
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight * 0.6,
    z: zOverride ?? (Math.random() * 1.5 + 0.3) // глубина
  };
}

// создаём облака
for (let i = 0; i < 25; i++) {
  clouds.push(spawnCloud());
}

/* 🫳 свайп управление */
document.addEventListener("touchmove", (e) => {
  let t = e.touches[0];
  let dx = (t.clientX - window.innerWidth / 2);
  camX = dx * 0.002;
});

/* ✋ тормоз */
document.addEventListener("touchstart", () => hold = true);
document.addEventListener("touchend", () => hold = false);

function loop() {

  // 🚀 скорость
  if (hold) {
    speed *= 0.97;
    if (speed < 0.3) speed = 0.3;
  } else {
    speed += 0.01;
    if (speed > 3.5) speed = 3.5;
  }

  // ☁️ облака “летят в тебя”
  for (let c of clouds) {

    c.z -= speed * 0.01;

    if (c.z <= 0.2) {
      Object.assign(c, spawnCloud(1.5));
    }

    // перспектива (FPV)
    let scale = 1 / c.z;

    let x = c.x + camX * 800 * scale;
    let y = c.y + (1 - c.z) * window.innerHeight * 0.4;

    let size = 140 * scale;

    if (!c.el) {
      c.el = document.createElement("div");
      c.el.className = "cloud";
      document.body.appendChild(c.el);
    }

    c.el.style.width = size + "px";
    c.el.style.height = size * 0.6 + "px";
    c.el.style.left = x + "px";
    c.el.style.top = y + "px";
  }

  document.getElementById("hud").innerText =
    "Speed: " + speed.toFixed(2);

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
